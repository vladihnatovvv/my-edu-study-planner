<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>roadmap.sh Study Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <p class="kicker">roadmap.sh study tracker</p>
        <h1>Frontend / Backend / Full Stack</h1>
        <p class="header-note">
          Click items as you complete them. Labels are adapted from the official
          roadmap.sh roadmaps.
        </p>
      </header>

      <section class="stats-bar" aria-label="Progress">
        <div class="stat-box">
          <span>Total</span>
          <strong id="totalSteps">0</strong>
        </div>
        <div class="stat-box">
          <span>Done</span>
          <strong id="completedSteps">0</strong>
        </div>
        <div class="stat-box">
          <span>Left</span>
          <strong id="remainingSteps">0</strong>
        </div>
        <div class="stat-box stat-progress">
          <span>Progress</span>
          <strong id="overallProgressText">0%</strong>
          <div class="progress-track">
            <div id="overallProgressBar" class="progress-fill"></div>
          </div>
        </div>
      </section>

      <section class="toolbar">
        <div class="toolbar-group" role="group" aria-label="Filter">
          <button class="filter-button active" data-filter="all">All</button>
          <button class="filter-button" data-filter="todo">Todo</button>
          <button class="filter-button" data-filter="done">Done</button>
        </div>

        <div class="toolbar-group">
          <button id="expandAllButton" class="toolbar-button">Expand all</button>
          <button id="collapseAllButton" class="toolbar-button">Collapse all</button>
          <button id="resetButton" class="toolbar-button danger-button">Reset</button>
        </div>
      </section>

      <main id="planner" class="planner"></main>
    </div>

    <template id="sectionTemplate">
      <section class="roadmap-section">
        <button class="section-header" type="button">
          <div class="section-heading">
            <h2 class="section-title"></h2>
            <a class="section-link" target="_blank" rel="noreferrer"></a>
          </div>
          <div class="section-meta">
            <span class="section-progress-text"></span>
            <span class="section-toggle" aria-hidden="true">+</span>
          </div>
        </button>
        <div class="section-body">
          <div class="section-progress-track">
            <div class="section-progress-fill"></div>
          </div>
          <div class="step-list"></div>
        </div>
      </section>
    </template>

    <template id="stepTemplate">
      <article class="step-card">
        <label class="step-main">
          <input class="step-checkbox" type="checkbox" />
          <span class="step-copy">
            <span class="step-title"></span>
            <span class="step-kind"></span>
          </span>
        </label>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
